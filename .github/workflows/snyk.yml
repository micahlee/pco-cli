name: snyk

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: snyk go dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Go module
        id: go-module
        shell: bash
        run: |
          if [[ -f go.mod ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod found; skipping Snyk until the CLI implementation lands."
          fi

      - name: Set up Go
        if: steps.go-module.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Snyk
        if: steps.go-module.outputs.present == 'true'
        uses: snyk/actions/golang@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium

